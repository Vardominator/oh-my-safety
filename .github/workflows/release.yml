name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches OMS_VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -o 'OMS_VERSION="[^"]*"' lib/core.sh | cut -d'"' -f2)
          echo "tag=$tag version=$ver"
          [ "$tag" = "$ver" ] || { echo "::error::tag v$tag != OMS_VERSION $ver"; exit 1; }

      - name: Checksum the tag source archive (what the formula downloads)
        id: sha
        run: |
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          for i in 1 2 3 4 5; do
            curl -fsSL "$url" -o source.tar.gz && break
            echo "archive not ready yet, retrying..."; sleep 5
          done
          sha=$(shasum -a 256 source.tar.gz | awk '{print $1}')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          printf '%s  %s\n' "$sha" "${GITHUB_REPOSITORY##*/}-${GITHUB_REF_NAME}.tar.gz" > checksums.txt
          echo "source archive sha256=$sha"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: checksums.txt

      # main is a protected branch, so open a PR to bump the formula's sha256
      # (the formula URL already points at the versioned tag archive). Merging it
      # publishes the release via Homebrew.
      - name: Open formula-bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          sha="${{ steps.sha.outputs.sha }}"
          f=Formula/oh-my-safety.rb
          sed -i "s|/archive/refs/tags/v[0-9.]*\.tar\.gz|/archive/refs/tags/v${ver}.tar.gz|" "$f"
          sed -i "s|sha256 \"[^\"]*\"|sha256 \"${sha}\"|" "$f"
          if git diff --quiet -- "$f"; then
            echo "Formula already up to date."; exit 0
          fi
          branch="formula-bump-${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git commit -am "Update formula sha256 for ${GITHUB_REF_NAME}"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "Update formula for ${GITHUB_REF_NAME}" \
            --body "Automated sha256 bump for ${GITHUB_REF_NAME}. Merge to publish the release via Homebrew."
